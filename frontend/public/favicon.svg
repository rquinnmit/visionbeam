<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1424"/>
      <stop offset="100%" stop-color="#08070b"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff2e93"/>
      <stop offset="100%" stop-color="#00e5ff"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="12" fill="url(#bg)"/>
  <g filter="url(#glow)">
    <circle cx="32" cy="32" r="20" fill="none" stroke="url(#ring)" stroke-width="2"/>
    <circle cx="32" cy="32" r="13" fill="none" stroke="#00e5ff" stroke-width="1" opacity="0.65"/>
    <circle cx="32" cy="32" r="3.2" fill="#ff2e93"/>
  </g>
  <g stroke="#f5f1ff" stroke-width="1" stroke-linecap="square" opacity="0.85">
    <line x1="32" y1="6" x2="32" y2="12"/>
    <line x1="32" y1="52" x2="32" y2="58"/>
    <line x1="6" y1="32" x2="12" y2="32"/>
    <line x1="52" y1="32" x2="58" y2="32"/>
  </g>
</svg>
